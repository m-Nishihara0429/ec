<!DOCTYPE html>
<!-- Thymeleaf属性(th:*)を使うための名前空間宣言 -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!-- パスワード再設定申請ページのタイトル -->
    <title>パスワードをお忘れの方 | Simple EC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- 共通ヘッダーフラグメントを差し込む -->
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container narrow">
    <h1>パスワードをお忘れの方</h1>

    <!-- エラーメッセージがある場合のみ表示 -->
    <p class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <!-- th:if="${resetUrl}" はコントローラが再設定リンク発行に成功して resetUrl 変数をセットした場合のみ表示する条件分岐。
         成功後はフォームではなく、発行されたリンクを案内する画面に切り替わる -->
    <div th:if="${resetUrl}">
        <p class="alert-success">再設定リンクを発行しました。</p>
        <div class="hint-box">
            <p>本来はメールで送信されますが、このデモ環境では画面に直接表示しています。</p>
            <!-- th:href="${resetUrl}" は変数の値をそのままURLとして使う（@{...}ではなく素の変数式）。
                 th:text で同じURLをリンクの表示テキストとしても出している -->
            <p><a th:href="${resetUrl}" th:text="${resetUrl}"></a></p>
            <p>このリンクは30分間有効です。</p>
        </div>
    </div>

    <!-- th:unless="${resetUrl}" は resetUrl が未設定（＝まだ発行前）の場合にのみメールアドレス入力フォームを表示。
         th:object="${forgotPasswordForm}" が th:field のバインド先 -->
    <form th:unless="${resetUrl}" th:action="@{/forgot-password}" th:object="${forgotPasswordForm}" method="post" class="form">
        <div class="form-group">
            <label for="email">メールアドレス</label>
            <!-- forgotPasswordForm.email にバインドされた入力欄 -->
            <input type="email" id="email" th:field="*{email}" autofocus>
            <!-- email プロパティのバリデーションエラーを表示 -->
            <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>
        <!-- 再設定リンク発行ボタン -->
        <button type="submit" class="btn btn-primary">再設定リンクを発行</button>
    </form>

    <!-- ログインページへ戻るリンク -->
    <p><a th:href="@{/login}">ログインページに戻る</a></p>
</main>

<!-- 共通フッターフラグメントを差し込む -->
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
