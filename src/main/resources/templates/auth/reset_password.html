<!DOCTYPE html>
<!-- Thymeleaf属性(th:*)を使うための名前空間宣言 -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- パスワード再設定ページのタイトル -->
    <title>パスワード再設定 | Simple EC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- 共通ヘッダーフラグメントを差し込む -->
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container narrow">
    <h1>パスワード再設定</h1>

    <!-- エラーメッセージがある場合のみ表示（例: トークンが無効・期限切れなど） -->
    <p class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <!-- th:if="${resetPasswordForm}" はコントローラがフォームオブジェクトを渡した場合（＝トークンが有効な場合）のみ
         新しいパスワード入力フォームを表示する条件分岐 -->
    <form th:if="${resetPasswordForm}" th:action="@{/reset-password}" th:object="${resetPasswordForm}" method="post" class="form">
        <!-- URLから受け取ったリセット用トークンを hidden フィールドとしてそのままフォームに保持し、送信時に一緒に送る -->
        <input type="hidden" th:field="*{token}">
        <div class="form-group">
            <label for="password">新しいパスワード（8文字以上）</label>
            <!-- resetPasswordForm.password にバインドされた新パスワード入力欄 -->
            <input type="password" id="password" th:field="*{password}" autofocus>
            <!-- password プロパティのバリデーションエラーを表示 -->
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>
        <!-- パスワード再設定を実行するボタン -->
        <button type="submit" class="btn btn-primary">パスワードを再設定</button>
    </form>

    <!-- th:unless="${resetPasswordForm}" はフォームが渡されなかった場合（＝トークンが無効・期限切れ）に
         再度パスワード再設定をやり直すための案内リンクを表示 -->
    <p th:unless="${resetPasswordForm}"><a th:href="@{/forgot-password}">もう一度パスワード再設定を試す</a></p>

    <!-- ログインページへ戻るリンク -->
    <p><a th:href="@{/login}">ログインページに戻る</a></p>
</main>

<!-- 共通フッターフラグメントを差し込む -->
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
