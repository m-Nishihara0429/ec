<!-- マイページ: パスワード変更ページ。現在のパスワード確認と新パスワード入力の2項目を持つフォーム -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>パスワード変更 | Simple EC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container narrow">
    <h1>パスワード変更</h1>

    <!-- errorMessageがセットされているとき（例: 現在のパスワードが間違っている場合）にエラー文言を表示する -->
    <p class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <!-- th:object="${changePasswordForm}" でこのフォームのバインド対象を指定 -->
    <form th:action="@{/mypage/password}" th:object="${changePasswordForm}" method="post" class="form">
        <div class="form-group">
            <label for="currentPassword">現在のパスワード</label>
            <!-- 本人確認のため、変更前に現在のパスワードを入力させる -->
            <input type="password" id="currentPassword" th:field="*{currentPassword}" autofocus>
            <p class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></p>
        </div>
        <div class="form-group">
            <label for="newPassword">新しいパスワード（8文字以上）</label>
            <input type="password" id="newPassword" th:field="*{newPassword}">
            <p class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>
        </div>
        <button type="submit" class="btn btn-primary">パスワードを変更</button>
    </form>

    <p><a th:href="@{/mypage}">マイページに戻る</a></p>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
