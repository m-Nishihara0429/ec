<!-- 管理画面: FAQ管理ページ。一覧・削除・新規登録/編集画面への導線をまとめている -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ管理 | Simple EC 管理画面</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container">
    <div th:replace="~{fragments/admin_nav :: nav}"></div>

    <div class="page-header">
        <h1>FAQ管理</h1>
        <a th:href="@{/admin/faqs/new}" class="btn btn-primary">新規登録</a>
    </div>

    <!-- 削除失敗時（既に削除済み等）のエラーメッセージをフラッシュ属性から表示する -->
    <p class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <table class="table">
        <thead><tr><th>表示順</th><th>質問</th><th></th></tr></thead>
        <tbody>
        <tr th:each="faq : ${faqs}">
            <td th:text="${faq.displayOrder}"></td>
            <td th:text="${faq.question}"></td>
            <td>
                <a th:href="@{/admin/faqs/{id}/edit(id=${faq.id})}">編集</a>
                <form th:action="@{/admin/faqs/{id}/delete(id=${faq.id})}" method="post" class="inline-form"
                      onsubmit="return confirm('このFAQを削除しますか？');">
                    <button type="submit" class="link-btn danger">削除</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
