<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせ | Simple EC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container narrow">
    <h1>お問い合わせ</h1>

    <!-- ?sent が付いた場合（送信成功後のリダイレクト）に表示する完了メッセージ -->
    <p class="alert-success" th:if="${param.sent}">お問い合わせを受け付けました。ご連絡ありがとうございます。</p>

    <!-- 問い合わせフォーム。th:objectでバインド対象のDTO(contactForm)を指定する -->
    <form th:action="@{/contact}" th:object="${contactForm}" method="post" class="form">
        <div class="form-group">
            <label for="name">お名前</label>
            <input type="text" id="name" th:field="*{name}">
            <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>
        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" th:field="*{email}">
            <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>
        <div class="form-group">
            <label for="subject">件名</label>
            <input type="text" id="subject" th:field="*{subject}">
            <p class="field-error" th:if="${#fields.hasErrors('subject')}" th:errors="*{subject}"></p>
        </div>
        <div class="form-group">
            <label for="message">お問い合わせ内容</label>
            <textarea id="message" th:field="*{message}" rows="6"></textarea>
            <p class="field-error" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></p>
        </div>
        <button type="submit" class="btn btn-primary">送信する</button>
    </form>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
