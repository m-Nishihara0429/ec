spring.application.name=ec-site
# RenderなどのPaaSはリッスンポートを環境変数PORTで指定してくるため、未設定時は従来通り8080を使う
server.port=${PORT:8080}

# --- SQLite（ローカル開発用のデフォルト。本番(Render)ではspring.profiles.active=postgresで
#     application-postgres.propertiesが上書きし、PostgreSQLに接続する） ---
spring.datasource.url=jdbc:sqlite:ecsite.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- 静的リソースのフィンガープリンティング ---
# CSS/JSの中身が変わるとファイル名にコンテンツハッシュが付与され、URLが変わる。
# th:href/th:src="@{...}" で参照している箇所は自動的にハッシュ付きURLに書き換わるため、
# ブラウザの長期キャッシュ(Cache-Control: max-age)があってもデプロイ後すぐに最新版が反映される。
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# --- Multipart (product image upload not required but keep sane defaults) ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- リバースプロキシ配下でのクライアントIP解決 ---
# 本番(Render等のPaaS)はリクエストがロードバランサー/リバースプロキシ経由で届くため、
# 何も設定しないとHttpServletRequest#getRemoteAddr()が常にプロキシのIPを返してしまい、
# ログインのレート制限(LoginRateLimitFilter)やSecurityAuditListenerの監査ログが
# 実際のクライアントIPではなく全ユーザー共通の値になってしまう。
# frameworkに設定するとX-Forwarded-For等のヘッダーからSpringが実際のクライアントIPを
# 復元するようになる（Renderなど信頼できるプロキシ経由の場合のみ有効化すること）。
server.forward-headers-strategy=framework

# --- Remember-me (login persistence)。公開リポジトリに実際の秘密鍵を残さないよう、
#     環境変数REMEMBER_ME_KEYで上書きできるようにしている（未設定時はローカル開発用の値を使う） ---
app.remember-me.key=${REMEMBER_ME_KEY:ec-site-remember-me-key}

# --- マスター管理者(ROLE_MASTER)アカウントのパスワード。実際のパスワードはソースに書かず、
#     環境変数MASTER_PASSWORDで注入する（未設定時はDataInitializer側の無害なプレースホルダーを使う） ---
app.master.password=${MASTER_PASSWORD:ChangeMe_Master2026}

# --- ロギング ---
# アプリ独自のログ（ログイン成否・パスワード変更・注文確定/キャンセル等の監査ログ）はINFO以上を出力する
logging.level.com.example.ec=INFO
# 日時・スレッド名・ログレベル・ロガー名を含む形式にし、本番でも発生源を追いやすくする
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# --- Actuator（監視用エンドポイント） ---
# health（死活監視。Renderなどのヘルスチェックから利用するため未認証で公開）・
# info（ビルド情報）・metrics（JVM/HTTPメトリクス）の3つだけをActuatorとして有効化する。
# それ以外（env, beans等）は機密情報を含みうるため有効化自体しない。
# 有効化したうちinfo・metricsについても、SecurityConfigでhealth以外はADMIN権限のみに
# アクセスを制限しており、実際に未認証・一般会員に公開されるのはhealthのみである。
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
