# Render本番環境向けプロファイル。SPRING_PROFILES_ACTIVE=postgres で有効化する。
# application.properties（SQLite向けのデフォルト設定）のうち、DB接続に関する項目だけを
# ここで上書きする（それ以外の設定はapplication.propertiesの値がそのまま使われる）。
#
# DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORDは、render.yamlのfromDatabaseで
# RenderのPostgreSQLインスタンスから自動的に注入される環境変数。

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# 本番相当の環境ではテンプレートキャッシュを有効にしてパフォーマンスを優先する
spring.thymeleaf.cache=true
