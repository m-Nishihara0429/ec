# Render本番環境向けプロファイル。SPRING_PROFILES_ACTIVE=postgres で有効化する。
# application.properties（SQLite向けのデフォルト設定）のうち、DB接続に関する項目だけを
# ここで上書きする（それ以外の設定はapplication.propertiesの値がそのまま使われる）。
#
# DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORDは、Renderダッシュボードの環境変数タブで
# 手動設定する外部Neon PostgreSQLの接続情報（render.yaml参照）。
# sslmode=requireはNeonが接続にSSLを必須としているため付与している。

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# 本番相当の環境ではテンプレートキャッシュを有効にしてパフォーマンスを優先する
spring.thymeleaf.cache=true

# 静的リソース(css/js/img)にCache-Controlヘッダーを付与し、ブラウザに30日間キャッシュさせる。
# Render無料プランはCPUが限られており、ページ遷移のたびにCSS/JS/画像を再取得すると
# まれに応答できず404になることがあるため、そもそも再取得の頻度自体を減らす目的。
spring.web.resources.cache.cachecontrol.max-age=30d
spring.web.resources.cache.cachecontrol.cache-public=true
